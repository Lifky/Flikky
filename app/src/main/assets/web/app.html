<!DOCTYPE html>
<html lang="zh-CN" class="mdui-theme-auto">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flikky</title>
    <link rel="stylesheet" href="/static/vendor/mdui.css">
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
    <div class="chat">
        <mdui-top-app-bar>
            <mdui-top-app-bar-title>Flikky</mdui-top-app-bar-title>
            <div class="chat-meta" style="margin-right:16px;">
                <mdui-chip id="conn" variant="assist" selected>连接中…</mdui-chip>
                <span id="uptime">00:00</span>
                <span>·</span>
                <span id="count">0</span><span> 文件</span>
                <span>·</span>
                <span id="rate">0 B/s</span>
            </div>
        </mdui-top-app-bar>

        <div id="list" class="chat-list"></div>

        <div class="chat-input-row">
            <input type="file" id="file-picker" style="display:none" multiple>
            <mdui-button id="file-btn" variant="outlined">附件</mdui-button>
            <mdui-text-field
                id="text-input"
                variant="outlined"
                label="消息"
                placeholder="Enter 发送 · Shift+Enter 换行"
                rows="1"
                autosize
                min-rows="1"
                max-rows="4">
            </mdui-text-field>
            <mdui-button id="send-btn" variant="filled">发送</mdui-button>
        </div>
    </div>

    <script src="/static/vendor/mdui.global.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
