<!DOCTYPE html>
<html lang="zh-CN" class="mdui-theme-auto">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flikky</title>
    <link rel="stylesheet" href="/static/vendor/mdui.css">
    <link rel="stylesheet" href="/static/tokens.css">
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="chat-page">
    <div class="chat">
        <mdui-top-app-bar>
            <div class="header-peer" id="header-peer" aria-label="对方信息">
                <div class="avatar-circle" id="peer-avatar" aria-label="对方头像"></div>
                <span class="header-peer-name" id="peer-name"></span>
            </div>
            <div class="chat-meta" style="margin-right:8px;">
                <mdui-chip id="conn" variant="assist" selected>连接中…</mdui-chip>
                <span id="uptime">00:00</span>
                <span>·</span>
                <span id="count">0</span><span> 文件</span>
                <span>·</span>
                <span id="rate">0 B/s</span>
            </div>
            <div class="header-my-avatar-wrap" style="margin-right:16px;">
                <button class="avatar-circle avatar-btn" id="my-avatar-btn" aria-label="我的头像，点击更换" type="button"></button>
            </div>
        </mdui-top-app-bar>

        <!-- Avatar picker (12 presets) — official mdui-dialog -->
        <mdui-dialog id="avatar-picker" close-on-overlay-click close-on-esc headline="选择头像">
            <div class="avatar-picker-grid" id="avatar-picker-grid"></div>
        </mdui-dialog>

        <div id="conn-banner" class="conn-banner" hidden></div>
        <div id="list" class="chat-list"></div>

        <div class="chat-input-row">
            <input type="file" id="file-picker" style="display:none" multiple>
            <mdui-button id="file-btn" variant="outlined">
                <mdui-icon slot="icon">
                    <!-- Material Symbols: attach_file (same path as App ic_attach_file.xml) -->
                    <svg viewBox="0 -960 960 960"><path d="M720-330q0 104-73 177T470-80q-104 0-177-73t-73-177v-370q0-75 52.5-127.5T400-880q75 0 127.5 52.5T580-700v350q0 46-32 78t-78 32q-46 0-78-32t-32-78v-370h80v370q0 13 8.5 21.5T470-320q13 0 21.5-8.5T500-350v-350q-1-42-29.5-71T400-800q-42 0-71 29t-29 71v370q-1 71 49 120.5T470-160q70 0 119-49.5T640-330v-390h80v390Z"/></svg>
                </mdui-icon>
                附件
            </mdui-button>
            <mdui-text-field
                id="text-input"
                variant="outlined"
                label="消息"
                placeholder="Enter 发送 · Shift+Enter 换行"
                rows="1"
                autosize
                min-rows="1"
                max-rows="4">
            </mdui-text-field>
            <mdui-button id="send-btn" variant="filled">
                <mdui-icon slot="icon">
                    <!-- Material Symbols: arrow_upward (same path as App ic_arrow_upward.xml) -->
                    <svg viewBox="0 -960 960 960"><path d="M440-160v-487L216-423l-56-57 320-320 320 320-56 57-224-224v487h-80Z"/></svg>
                </mdui-icon>
                发送
            </mdui-button>
        </div>
    </div>

    <mdui-snackbar id="snackbar" placement="bottom"></mdui-snackbar>

    <!-- v1.3 D26: 撤回二次确认 dialog。两端一致：手机端 AlertDialog ⇄ 浏览器 mdui-dialog -->
    <mdui-dialog id="recall-confirm-dialog" close-on-overlay-click="true" close-on-esc="true" headline="撤回这条消息？">
        <div style="padding: 0 24px 8px;">撤回后两端都会消失，不可恢复。</div>
        <mdui-button slot="action" data-action="cancel" variant="text">取消</mdui-button>
        <mdui-button slot="action" data-action="confirm" variant="text">撤回</mdui-button>
    </mdui-dialog>

    <script src="/static/vendor/mdui.global.js"></script>
    <script src="/static/snackbar.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
