<!DOCTYPE html>
<html lang="zh-CN" class="mdui-theme-auto">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="login.title">Flikky 登录</title>
    <link rel="stylesheet" href="/static/vendor/mdui.css">
    <link rel="stylesheet" href="/static/tokens.css">
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
    <div class="login-wrap">
        <mdui-card variant="filled">
            <h2 data-i18n="login.heading" style="margin:0 0 16px; font-size:22px;">输入 PIN 码</h2>
            <form id="pin-form" autocomplete="off" novalidate>
                <mdui-text-field
                    id="pin-input"
                    class="pin-field"
                    variant="outlined"
                    type="tel"
                    label="PIN"
                    maxlength="6"
                    autofocus>
                </mdui-text-field>
                <mdui-button id="submit-btn" data-i18n="login.submit" type="submit" variant="filled" full-width style="margin-top:16px;">
                    进入
                </mdui-button>
            </form>
        </mdui-card>
    </div>

    <script src="/static/vendor/mdui.global.js"></script>
    <script src="/static/i18n.js"></script>
    <script src="/static/login.js"></script>
</body>
</html>
